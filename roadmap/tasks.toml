[[task]]
id = 3
phase = 2
bundle = "integration_coverage"
status = "done"
title = "Integration tests against Moderato testnet"
scores = { d = 3, b = 7, u = 6 }
created_at = "2026-04-19"
scored_at = "2026-04-19"
done_at = "2026-04-19"
shipped_in = "v0.1.1"
body = """
Opt-in `:integration` suite at `test/onchain/tempo/integration/moderato_test.exs` exercising the full Builder → RPC pipeline against live Moderato (chain `42_431`, `https://rpc.moderato.tempo.xyz`). Three tests: Builder real nonce fetch + 0x76 round-trip via `Transaction.deserialize/1`, `RPC.fetch_receipt/2` returning `{:error, "Transaction not found on-chain"}` for unknown hashes, and `RPC.broadcast_sync/2` confirming a self-transfer of pathUSD with a real receipt + logs. New `test/support/moderato_faucet.ex` helper self-funds a fresh keypair per test via the Moderato `tempo_fundAddress` custom JSON-RPC — no env var required. Fresh keypair per test avoids nonce races; loud `flunk/1` on funding failure per project critical-rules.
"""

[[task]]
