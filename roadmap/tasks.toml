[[task]]
id = 6
phase = 3
bundle = "faucet_polish"
status = "pending"
title = "Replace Faucet fixed-sleep settle with poll loop"
scores = { d = 3, b = 3, u = 3 }
created_at = "2026-04-19"
scored_at = "2026-05-15"
body = """
`Onchain.Tempo.Faucet.fresh_funded_wallet/2` currently sleeps a fixed `@default_settle_ms` (2_500ms) after funding before returning. Replace with a poll loop on `eth_getTransactionCount` or `eth_getBalance` so the helper returns as soon as the funding transaction lands (Moderato blocks ~500ms; the fixed sleep wastes ~2s per integration test). Discovered during the v0.1.1 integration test work and carried forward when the helper was promoted to a public module in v0.2.0.
"""
acceptance_criteria = [
  "fresh_funded_wallet/1 returns as soon as the funding tx is confirmed on-chain (not after a fixed sleep)",
  "Integration suite remains green on Moderato (faucet still funds reliably)",
  "Poll loop respects a configurable timeout / max-iterations to avoid hanging on slow blocks",
  "Unit tests can still skip the wait by passing the existing :settle_ms shortcut (or equivalent zero-poll-time option)"
]
files_to_modify = [
  "lib/onchain/tempo/faucet.ex",
  "test/onchain/tempo/faucet_test.exs"
]

[[task]]
id = 7
phase = 3
bundle = "public_faucet"
status = "done"
title = "Public `Onchain.Tempo.Faucet` helper for `tempo_fundAddress`"
scores = { d = 2, b = 5, u = 5 }
created_at = "2026-04-19"
scored_at = "2026-04-19"
done_at = "2026-04-19"
shipped_in = "v0.2.0"
body = """
Promoted the previously test-only `Onchain.Tempo.TestSupport.ModeratoFaucet` (`test/support/moderato_faucet.ex`) into public `Onchain.Tempo.Faucet` at `lib/onchain/tempo/faucet.ex` so downstream consumers writing their own integration suites can reuse the Moderato faucet recipe. Public API: `rpc_url/0` (Moderato default, `TEMPO_RPC_URL` override), `fund_address/2` (thin wrapper around `tempo_fundAddress` JSON-RPC, returns `{:ok, [tx_hash]}`), `fresh_funded_wallet/1` (generates a 32-byte keypair, funds it, sleeps for settlement). Both accept an opts keyword list with `:rpc_url`, `:req_options`, and (for `fresh_funded_wallet/1`) `:settle_ms`. Registered in `OnchainTempo`'s Descripex.Discoverable module list. Integration suite migrated; old test-support helper deleted; new unit tests at `test/onchain/tempo/faucet_test.exs` cover happy/error/transport paths via Req.Test stubs.
"""

[[task]]
id = 8
phase = 2
bundle = "cartouche_migration"
status = "done"
title = "Migrate signing to Cartouche"
scores = { d = 2, b = 6, u = 5 }
created_at = "2026-05-15"
scored_at = "2026-05-15"
done_at = "2026-05-15"
shipped_in = "v0.2.1"
body = """
Switched internal signing/recovery aliases from `Signet.Signer.Curvy` / `Signet.Recover` to `Cartouche.Signer.Curvy` / `Cartouche.Recover` in `Onchain.Tempo.Transaction` and `Onchain.Tempo.Transaction.Builder`. Cartouche is ZenHive's fork of signet — drop-in compatible, available transitively via `onchain`. Tightened the `onchain` dep from `~> 0.5` to `~> 0.5.3` to ensure the cartouche-bearing version is resolved. Public API unchanged — purely internal refactor for consumers.
"""

