[[task]]
id = 1
phase = 1
bundle = "extraction"
status = "done"
title = "Extract Tempo primitives from MPP"
scores = { d = 8, b = 10, u = 10 }
created_at = "2026-03-28"
scored_at = "2026-03-28"
done_at = "2026-03-28"
shipped_in = "v0.1.0"
body = """
Initial extraction of Tempo blockchain primitives from MPP (Machine Payments Protocol) into a standalone Elixir library. Built `Onchain.Tempo.TIP20` (selectors, calldata encoders, DEX address), `Onchain.Tempo.Transaction` (0x76 struct, RLP deserialization, payment matching, fee-payer co-signing on 0x78 domain), `Onchain.Tempo.Transaction.Builder` (build + sign 0x76 — transfer, multicall, fee-payer variants), `Onchain.Tempo.RPC` (JSON-RPC: broadcast async/sync, fetch + parse receipt), `Onchain.Tempo.Transfer` (TransferWithMemo event log parsing), and the `OnchainTempo` root module with Descripex Discoverable. 77 unit tests covering deserialization, calldata encoding, payment matching, call scope validation, RPC stubs, and builder validation.
"""

