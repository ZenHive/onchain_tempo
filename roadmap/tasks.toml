status = "done"
title = "Raise Builder default gas_limit to 500_000"
scores = { d = 1, b = 3, u = 5 }
created_at = "2026-04-19"
scored_at = "2026-04-19"
done_at = "2026-04-19"
shipped_in = "v0.1.1"
body = """
`Onchain.Tempo.Transaction.Builder` `@default_gas_limit` bumped from 200_000 to 500_000 — a stock TIP-20 transfer on Moderato consumes ~272k, so the previous default under-provisioned real transfers. Integration test no longer needs a per-call `gas_limit` override. 500k is a ceiling, not an amount spent — no real-world cost change; just prevents `out of gas` for the common TIP-20 path.
"""

